# =============================================================================
# cicd-sensor カスタムルール
#
# 「CIのジョブ中にこういう動きをしたら検知して」というルールを自分で書くファイル。
# cicd-sensor は標準(baseline)で認証情報の読み取りなどは検知するが、
# 「メタデータへの通信」「特定ドメインへの送信」のような “自分の環境では
# 起きないはず” の挙動は、ここに書いて初めて検知される。
#
# 書き方の参考: https://cicd-sensor.github.io/ の User Guide
#   - イベントの種類と使えるフィールド : rule-event-types
#   - condition(条件式)の文法          : rule-cel-conditions
#   - ルールファイルの構造              : rule-set
# =============================================================================

rule_sets:
    # ruleset_id = ルールのまとまりにつける名前。レポートにこの名前で出る。
    #              「プロジェクト名/用途」の形が慣習。
  - ruleset_id: canary/custom
    rules:

      # -----------------------------------------------------------------------
      # ルール1: クラウドのメタデータエンドポイントへの通信を検知
      #
      # 169.254.169.254 は AWS/GCP/Azure 共通の「メタデータAPI」のアドレス。
      # ここに到達されるとサーバーの認証トークンを抜かれる恐れがある
      # (SSRF攻撃の典型的なゴール)。普通のビルドはここに通信しないので、
      # 通信が発生したら検知する、という考え方。
      # -----------------------------------------------------------------------
      - rule_id: imds_access                         # このルールの識別名(ユニークなら自由)
        rule_name: "Cloud metadata endpoint access (169.254.169.254)"  # レポートでの表示名
        event_type: network_connect                 # 何を見るか = 外向きのネットワーク接続
        condition: remote_ip == "169.254.169.254"    # 接続先IPがこの値と完全一致したら発火
        action: detect                               # 発火時の動作 = 検知記録(ジョブは止めない)

      # -----------------------------------------------------------------------
      # ルール2: 外部ドメイン example.com への送信を検知
      #
      # この実験では example.com を「データの持ち出し先」に見立てている。
      # 許可していない外部ドメインに通信したら検知する、という考え方。
      # 本番では example.com を「自社が許可していないドメイン」に置き換える。
      # -----------------------------------------------------------------------
      - rule_id: external_exfil_example_com
        rule_name: "Egress to example.com (simulated exfiltration)"
        event_type: domain                           # 何を見るか = ドメインへのアクセス(DNS解決)
        # 「example.com 本体」または「*.example.com (サブドメイン)」に一致したら発火
        condition: domain == "example.com" || domain.endsWith(".example.com")
        action: detect
